name: deploy

# Build the PWA and publish to GitHub Pages on every push to main, matching the
# bessel/vector-channels pattern. The Pages project-page build uses the
# /spectral-prism/ base path (pnpm build:pages); local dev, the gate, and the
# embedded MMGIS/OpenMCT mounts keep the '/' base. ci.yml runs the verification
# gate; this workflow only builds and deploys.

on:
  push:
    branches: [main]
  workflow_dispatch:

# The minimum the deploy needs: read the repo, write the Pages artifact, mint
# the OIDC token deploy-pages verifies.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - uses: actions/configure-pages@v5
      - name: Build the PWA for Pages (base /spectral-prism/)
        run: pnpm build:pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/spectral-prism/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
